<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь Развития</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Base styles */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Black background */
            color: #e1d9ce; /* Light text color */
            font-family: 'Orbitron', sans-serif; /* Futuristic font */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }

        /* Utility classes */
        .flex-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hidden {
            display: none !important;
        }

        /* Header styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8); /* Slightly transparent background */
        }

        .header-button {
            background-color: #e1d9ce;
            color: #000000; /* Black text */
            border: none;
            border-radius: 15px; /* Rounded corners */
            padding: 0.75rem 1.25rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3); /* Beige/white glow */
            text-shadow: none; /* No text shadow for these buttons */
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-button:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 0 0 25px rgba(255, 255, 255, 0.5); /* Brighter beige/white glow on hover */
            transform: translateY(-2px);
        }

        .header-button i {
            margin-right: 0.5rem;
        }

        /* Music controls specific styles */
        .music-controls-container {
            position: relative;
            margin-left: auto; /* Pushes it to the right */
        }

        #music-hamburger {
            background-color: #e1d9ce;
            color: #000000;
            border: none;
            border-radius: 50%; /* Circular button */
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3); /* Beige/white glow */
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #music-hamburger:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 0 0 25px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        #music-menu {
            position: absolute;
            top: 60px; /* Position below hamburger */
            right: 0;
            background-color: rgba(30, 30, 30, 0.95);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 10px;
            min-width: 150px;
        }

        #music-menu.show {
            display: flex;
        }

        .music-menu-item {
            background-color: #e1d9ce;
            color: #000000; /* Black text */
            border: none;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5); /* Beige/white glow */
            transition: all 0.2s ease;
        }

        .music-menu-item:hover {
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
            background-color: #f0e9e0;
        }

        /* Main content area */
        .container {
            flex-grow: 1;
            padding: 2rem 1rem;
            margin-top: 80px; /* Space for fixed header */
            margin-bottom: 120px; /* Space for fixed footer */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        /* Page specific styles */
        .page {
            width: 100%;
            max-width: 900px; /* Max width for content */
            padding: 1rem;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Button grid for main page */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* General button style */
        .main-button, .sub-button {
            background-color: #e1d9ce;
            color: #000000; /* Black text */
            border: none;
            border-radius: 20px; /* More rounded */
            padding: 1.5rem 1rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5), 0 0 15px rgba(255, 255, 255, 0.3); /* Beige/white glow */
            text-shadow: none; /* Remove white text shadow */
            transition: all 0.3s ease;
            text-transform: uppercase;
            white-space: normal; /* Allow text to wrap */
            word-wrap: break-word; /* Break long words */
            line-height: 1.3;
            min-height: 80px; /* Ensure minimum height for buttons */
        }

        .main-button:hover, .sub-button:hover {
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.7), 0 0 20px rgba(255, 255, 255, 0.5); /* Brighter beige/white glow on hover */
            transform: translateY(-3px);
        }

        /* Subtle green neon for LLM buttons and related elements */
        .llm-button {
            background-color: #e1d9ce; /* Light background */
            color: #000000; /* Black text for readability */
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.25rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(138, 255, 138, 0.5), 0 0 15px rgba(138, 255, 138, 0.3); /* Subtle green glow */
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .llm-button:hover {
            box-shadow: 0 0 12px rgba(138, 255, 138, 0.7), 0 0 20px rgba(138, 255, 138, 0.5); /* Brighter green glow on hover */
            transform: translateY(-2px);
        }

        #send-chat-button, #llm-modal-submit-button, #message-box-close-button {
            background-color: #e1d9ce;
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.25rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(138, 255, 138, 0.5); /* Subtle green glow */
            transition: all 0.3s ease;
        }

        #send-chat-button:hover, #llm-modal-submit-button:hover, #message-box-close-button:hover {
            box-shadow: 0 0 12px rgba(138, 255, 138, 0.7), 0 0 20px rgba(138, 255, 138, 0.5);
            transform: translateY(-2px);
        }

        /* Specific page content styling */
        .page-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #e1d9ce;
            text-shadow: 0 0 10px #fff;
        }

        .page-section {
            background-color: rgba(30, 30, 30, 0.9);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            text-align: left;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .page-section h3 {
            font-size: 1.8rem;
            color: #e1d9ce;
            text-shadow: 0 0 5px #fff;
            margin-top: 0;
            margin-bottom: 1rem;
        }

        .page-section p, .page-section ul {
            font-size: 1.1rem;
            color: #c0c0c0;
        }

        /* Changed link color to white-gray */
        .page-section a {
            color: #c0c0c0; /* White-gray text for links */
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .page-section a:hover {
            color: #e1d9ce; /* Slightly lighter on hover */
            text-decoration: underline;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            margin-bottom: 1rem;
            border-radius: 10px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Pomodoro Timer */
        #pomodoro-timer {
            font-size: 4rem;
            color: #e1d9ce; /* Light text color */
            text-shadow: 0 0 10px #fff; /* Subtle white glow */
            margin-bottom: 1rem;
        }

        .timer-controls button {
            background-color: #e1d9ce;
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* Beige/white glow */
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .timer-controls button:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }

        /* Footer buttons */
        .footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8); /* Slightly transparent background */
        }

        .footer-button {
            background-color: #e1d9ce;
            color: #000000;
            border: none;
            border-radius: 15px;
            padding: 0.75rem 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3); /* Beige/white glow */
            text-shadow: none; /* No text shadow */
            transition: all 0.3s ease;
        }

        .footer-button:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 0 0 25px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        /* AI Chat Container */
        .chat-container {
            position: fixed;
            bottom: 80px; /* Adjusted to be above the footer */
            left: 0;
            right: 0;
            background-color: rgba(10, 10, 10, 0.95);
            padding: 1rem;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.5);
            z-index: 999; /* Below header, above main content */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            max-height: calc(30vh - 80px); /* Adjust max-height to account for new bottom offset */
            transition: max-height 0.3s ease-in-out;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .chat-container.expanded {
            max-height: calc(70vh - 80px); /* Adjust expanded height */
        }

        #chat-toggle-button {
            background: none;
            border: none;
            color: #e1d9ce;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            width: 100%;
            text-align: center;
            margin-bottom: 0.5rem;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: background-color 0.2s ease;
        }

        #chat-toggle-button:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding-right: 10px; /* For scrollbar */
            font-size: 0.9rem;
            line-height: 1.5;
            color: #c0c0c0;
        }

        .chat-message {
            margin-bottom: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 10px;
            max-width: 80%;
        }

        .chat-message.user {
            background-color: #555;
            align-self: flex-end;
            margin-left: auto;
            color: #fff;
        }

        .chat-message.ai {
            background-color: #333;
            align-self: flex-start;
            margin-right: auto;
            color: #e1d9ce;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex-grow: 1;
            padding: 0.75rem;
            border: 1px solid #555;
            border-radius: 10px;
            background-color: #222;
            color: #e1d9ce; /* Keep light text for dark background */
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
        }

        #chat-input:focus {
            outline: none;
            border-color: rgba(138, 255, 138, 0.6); /* Subtle green glow on focus */
            box-shadow: 0 0 8px rgba(138, 255, 138, 0.4); /* Subtle green glow on focus */
        }

        .attachment-button {
            background-color: #e1d9ce;
            color: #000000;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(138, 255, 138, 0.5); /* Subtle green glow */
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .attachment-button:hover {
            box-shadow: 0 0 12px rgba(138, 255, 138, 0.7), 0 0 20px rgba(138, 255, 138, 0.5);
            transform: translateY(-2px);
        }

        /* Loading indicator for AI chat and modal */
        .loading-indicator {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #8aff8a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Generic LLM Modal Styles */
        .llm-modal {
            position: fixed;
            z-index: 1001; /* Above everything else */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8); /* Dark overlay */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .llm-modal-content {
            background-color: rgba(30, 30, 30, 0.95);
            margin: auto;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            width: 90%;
            max-width: 600px;
            position: relative;
            animation: zoomIn 0.3s ease-out;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .llm-modal-close-button {
            color: #e1d9ce;
            font-size: 2rem;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .llm-modal-close-button:hover,
        .llm-modal-close-button:focus {
            color: rgba(138, 255, 138, 0.8); /* Subtle green on hover */
        }

        #llm-modal-title {
            color: #e1d9ce;
            text-shadow: 0 0 8px #fff;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .llm-modal-input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #llm-modal-textarea {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #555;
            border-radius: 10px;
            background-color: #222;
            color: #e1d9ce; /* Keep light text for dark background */
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
        }

        #llm-modal-textarea:focus {
            outline: none;
            border-color: rgba(138, 255, 138, 0.6); /* Subtle green glow on focus */
            box-shadow: 0 0 8px rgba(138, 255, 138, 0.4); /* Subtle green glow on focus */
        }

        #llm-modal-response-area {
            background-color: #1a1a1a;
            border-radius: 10px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #llm-modal-response-text {
            color: #c0c0c0;
            white-space: pre-wrap; /* Preserve whitespace and line breaks */
            word-wrap: break-word;
        }

        .image-preview-container {
            margin-top: 10px;
            text-align: center;
        }

        .image-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .clear-image-button {
            background-color: #e1d9ce;
            color: #000000;
            border: none;
            border-radius: 5px;
            padding: 0.3rem 0.6rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        .clear-image-button:hover {
            background-color: #f0e9e0;
        }

        /* Custom Message Box Styles */
        .message-box {
            position: fixed;
            z-index: 1002; /* Above LLM modal */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .message-box-content {
            background-color: rgba(30, 30, 30, 0.95);
            margin: auto;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            width: 80%;
            max-width: 400px;
            text-align: center;
            animation: zoomIn 0.3s ease-out;
        }

        #message-box-text {
            font-size: 1.2rem;
            color: #e1d9ce;
            margin-bottom: 1.5rem;
        }

        /* Image Upload Choice Modal */
        #image-upload-choice-modal {
            position: fixed;
            z-index: 1003; /* Above message box */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #image-upload-choice-modal-content {
            background-color: rgba(30, 30, 30, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #image-upload-choice-modal-content button {
            background-color: #e1d9ce;
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        #image-upload-choice-modal-content button:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .header {
                padding: 0.75rem;
            }

            .header-button {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }

            #music-hamburger {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .container {
                padding: 1rem 0.5rem;
                margin-top: 70px;
                margin-bottom: 100px;
            }

            .button-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 15px;
            }

            .main-button, .sub-button, .llm-button {
                padding: 1rem 0.8rem;
                font-size: 0.9rem;
                min-height: 60px;
            }

            .page-title {
                font-size: 2rem;
                margin-bottom: 1.5rem;
            }

            .page-section {
                padding: 1rem;
                margin-bottom: 1rem;
            }

            .page-section h3 {
                font-size: 1.5rem;
            }

            .page-section p, .page-section ul {
                font-size: 1rem;
            }

            #pomodoro-timer {
                font-size: 3rem;
            }

            .timer-controls button {
                padding: 0.6rem 1.2rem;
                font-size: 1rem;
            }

            .footer {
                flex-direction: column;
                gap: 10px;
                padding: 0.75rem;
            }

            .footer-button {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .chat-container {
                padding: 0.75rem;
            }

            #chat-input {
                padding: 0.6rem;
                font-size: 0.9rem;
            }

            #send-chat-button {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .llm-modal-content, .message-box-content {
                padding: 1.5rem;
            }

            #llm-modal-title {
                font-size: 1.5rem;
            }

            #llm-modal-textarea {
                font-size: 0.9rem;
            }

            #llm-modal-submit-button {
                font-size: 0.9rem;
            }

            #llm-modal-response-text {
                font-size: 0.9rem;
            }

            #message-box-text {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .button-grid {
                grid-template-columns: 1fr; /* Single column on very small screens */
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button id="back-button" class="header-button hidden"><i class="fas fa-arrow-left"></i> Назад</button>
        <div class="music-controls-container">
            <button id="music-hamburger" class="header-button"><i class="fas fa-music"></i></button>
            <div id="music-menu" class="music-menu-content">
                <button id="music-play-pause" class="music-menu-item"><i class="fas fa-play"></i> / <i class="fas fa-pause"></i></button>
                <button id="music-next" class="music-menu-item"><i class="fas fa-forward"></i> Далее</button>
                <button id="music-prev" class="music-menu-item"><i class="fas fa-backward"></i> Назад</button>
            </div>
        </div>
    </div>

    <div class="container" id="app-container">
        </div>

    <div class="footer">

        /**

         * @param {string} aiPersona - Optional: defines the AI persona for the prompt (e.g., "Как финансовый консультант").
         */
        function showLlmModal(title, showInput, placeholder = '', initialPrompt = '', aiPersona = '') {
            llmModalTitle.textContent = title;
            llmModalTextarea.value = ''; // Clear previous input
            llmModalResponseText.innerHTML = ''; // Clear previous response, use innerHTML for markdown
            llmModalSubmitButton.dataset.aiPersona = aiPersona; // Store persona for submit handler

                llmModalInputArea.classList.remove('hidden');

                llmModalResponseArea.classList.add('hidden'); // Hide response area initially

        /**
         * Adds a message to the chat display.
         * @param {string} message - The message text.
         * @param {string} sender - 'user' or 'ai'.
         * @param {string} [imageData] - Optional Base64 image data to display.
         */
        function addChatMessage(message, sender, imageData = null) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('chat-message', sender);

            if (imageData) {
                const img = document.createElement('img');
                img.src = imageData;
                img.classList.add('chat-message-image');
                img.style.maxWidth = '100%';
                img.style.maxHeight = '150px';
                img.style.borderRadius = '10px';
                img.style.marginBottom = '5px';
                messageDiv.appendChild(img);
            }

            const textNode = document.createElement('p');
            textNode.textContent = message;
            messageDiv.appendChild(textNode);

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Scroll to bottom
        }

        /**
         * Sends a message to the AI and displays the response.
         * Uses the Gemini API.
         * @param {string} prompt - The user's prompt.
         * @param {HTMLElement} responseTarget - The element to display the AI response in.
         * @param {HTMLElement} loadingTarget - The loading indicator element.
         * @param {function} [callback] - Optional callback function to run after response.
         * @param {string} [imageData] - Optional Base64 image data.
         */
        async function callGeminiAPI(prompt, responseTarget, loadingTarget, callback = null, imageData = null) {
            loadingTarget.classList.remove('hidden');
            // If responseTarget is a p tag, clear its text. If it's a div, clear its children.
            if (responseTarget.tagName === 'P') {
                responseTarget.textContent = '';
            } else {
                responseTarget.innerHTML = ''; // Clear content for chat messages
            }

            try {
                let chatHistory = [];
                const parts = [{ text: prompt }];
                if (imageData) {
                    parts.push({
                        inlineData: {
                            mimeType: "image/png", // Assuming PNG, adjust if needed
                            data: imageData.split(',')[1] // Remove "data:image/png;base64," prefix
                        }
                    });
                }
                chatHistory.push({ role: "user", parts: parts });
                const payload = { contents: chatHistory };
                const apiKey = ""; // Canvas will provide this at runtime
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                loadingTarget.classList.add('hidden'); // Remove loading indicator

                if (result.candidates && result.candidates.length > 0 &&
                    result.candidates[0].content && result.candidates[0].content.parts &&
                    result.candidates[0].content.parts.length > 0) {
                    const text = result.candidates[0].content.parts[0].text;
                    if (responseTarget.tagName === 'P') {
                        // For LLM modal response, allow HTML/Markdown rendering
                        responseTarget.innerHTML = marked.parse(text); // Use marked.js for Markdown
                    } else { // For chat messages
                        addChatMessage(text, 'ai');
                    }
                    if (callback) callback(text);
                } else {
                    if (responseTarget.tagName === 'P') {
                        responseTarget.textContent = "Извините, не удалось получить ответ от AI.";
                    } else { // For chat messages
                        addChatMessage("Извините, не удалось получить ответ от AI.", 'ai');
                    }
                    console.error("Unexpected AI response structure:", result);
                }
            } catch (error) {
                loadingTarget.classList.add('hidden'); // Remove loading indicator
                if (responseTarget.tagName === 'P') {
                    responseTarget.textContent = "Произошла ошибка при общении с AI. Попробуйте снова.";
                } else { // For chat messages
                    addChatMessage("Произошла ошибка при общении с AI. Попробуйте снова.", 'ai');
                }
                console.error("Error communicating with AI:", error);
            }
        }

        /**
         * Sends a message to the main AI chat and displays the response.
         */
        async function sendAIChatMessage() {
            const prompt = chatInput.value.trim();
            if (!prompt && !currentImageBase64) return; // Don't send empty messages

            addChatMessage(prompt, 'user', currentImageBase64); // Display user message with image
            chatInput.value = '';
            chatImagePreviewContainer.classList.add('hidden');
            chatImagePreview.src = '';
            currentImageBase64 = null; // Clear image after sending

            const loadingIndicator = document.createElement('span');
            loadingIndicator.classList.add('loading-indicator');
            chatMessages.appendChild(loadingIndicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            await callGeminiAPI(prompt, chatMessages, loadingIndicator, null, currentImageBase64);
        }

            pageDiv.id = pageId;
            pageDiv.classList.add('page');
            pageDiv.innerHTML = `<h1 class="page-title">${pageTitle}</h1>` + pageContent;
            appContainer.appendChild(pageDiv);

            // Add event listeners for new buttons on the page
            pageDiv.querySelectorAll('[data-page]').forEach(button => {
                button.onclick = () => showPage(button.dataset.page);
            });
            pageDiv.querySelectorAll('[data-subpage]').forEach(button => {
                button.onclick = () => showPage(button.dataset.subpage);
            });
        }

        /**
         * Handles back button click.
         */
        function goBack() {
            if (historyStack.length > 1) {
                historyStack.pop(); // Remove current page
                const previousPageId = historyStack[historyStack.length - 1];
                showPage(previousPageId, false); // Show previous page, don't push to history
            }
        }

        // --- Music Player Functions ---

        /**
         * Toggles music play/pause.
         */
        function toggleMusicPlayPause() {
            if (isMusicPlaying) {
                backgroundMusic.pause();
                isMusicPlaying = false;
                musicPlayPauseButton.innerHTML = '<i class="fas fa-play"></i> Воспр.';
            } else {
                backgroundMusic.play().catch(e => console.error("Error playing music:", e));
                isMusicPlaying = true;
                musicPlayPauseButton.innerHTML = '<i class="fas fa-pause"></i> Пауза';
            }
        }

        /**
         * Plays the next track in the playlist.
         */
        function playNextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % musicTracks.length;
            backgroundMusic.src = musicTracks[currentTrackIndex];
            backgroundMusic.load();
            if (isMusicPlaying) {
                backgroundMusic.play().catch(e => console.error("Error playing next track:", e));
            }
        }

        /**
         * Plays the previous track in the playlist.
         */
        function playPreviousTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + musicTracks.length) % musicTracks.length;
            backgroundMusic.src = musicTracks[currentTrackIndex];
            backgroundMusic.load();
            if (isMusicPlaying) {
                backgroundMusic.play().catch(e => console.error("Error playing previous track:", e));
            }
        }

        // --- Pomodoro Timer Functions ---

        /**
         * Updates the Pomodoro timer display.
         */
        function updatePomodoroDisplay() {
            const minutes = Math.floor(pomodoroTimeLeft / 60);
            const seconds = pomodoroTimeLeft % 60;
            document.getElementById('pomodoro-timer').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        /**
         * Starts the Pomodoro timer.
         */
        function startPomodoro() {
            if (isPomodoroRunning) return;
            isPomodoroRunning = true;
            pomodoroTimerInterval = setInterval(() => {
                if (pomodoroTimeLeft > 0) {
                    pomodoroTimeLeft--;
                    updatePomodoroDisplay();
                } else {
                    clearInterval(pomodoroTimerInterval);
                    isPomodoroRunning = false;
                    pomodoroSound.play().catch(e => console.error("Error playing sound:", e)); // Play sound on completion
                    showMessageBox('Время Pomodoro истекло! Сделайте перерыв.');
                    pomodoroTimeLeft = 25 * 60; // Reset for next session
                    updatePomodoroDisplay();
                }
            }, 1000);
        }

        /**
         * Pauses the Pomodoro timer.
         */
        function pausePomodoro() {
            clearInterval(pomodoroTimerInterval);
            isPomodoroRunning = false;
        }

        /**
         * Resets the Pomodoro timer.
         */
        function resetPomodoro() {
            clearInterval(pomodoroTimerInterval);
            isPomodoroRunning = false;
            pomodoroTimeLeft = 25 * 60;
            updatePomodoroDisplay();
        }

        // --- Image Upload Functions ---

        /**
         * Displays the image preview.
         * @param {string} imageData - Base64 string of the image.
         * @param {HTMLElement} previewElement - The <img> element to update.
         * @param {HTMLElement} containerElement - The container for the preview and clear button.
         */
        function displayImagePreview(imageData, previewElement, containerElement) {
            previewElement.src = imageData;
            containerElement.classList.remove('hidden');
            currentImageBase64 = imageData;
        }

        /**
         * Clears the image preview and associated data.
         * @param {HTMLElement} previewElement - The <img> element to clear.
         * @param {HTMLElement} containerElement - The container for the preview and clear button.
         */
        function clearImagePreview(previewElement, containerElement) {
            previewElement.src = '';
            containerElement.classList.add('hidden');
            currentImageBase64 = null;
            imageUploadCamera.value = ''; // Clear file input
            imageUploadFile.value = ''; // Clear file input
        }

        /**
         * Handles file input change event to read image as Base64.
         * @param {Event} event - The change event.
         * @param {HTMLElement} previewElement - The <img> element to update.
         * @param {HTMLElement} containerElement - The container for the preview and clear button.
         */
        function handleImageFile(event, previewElement, containerElement) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    displayImagePreview(e.target.result, previewElement, containerElement);
                };
                reader.readAsDataURL(file);
            }
            imageUploadChoiceModal.classList.add('hidden'); // Hide choice modal
        }


        // --- Event Listeners ---

        // Initial page load
        document.addEventListener('DOMContentLoaded', () => {
            showPage('home'); // Load the home page first
        });

        // Back button click
        backButton.addEventListener('click', goBack);

        // Music hamburger menu toggle
        musicHamburger.addEventListener('click', (event) => {
            musicMenu.classList.toggle('show');
            event.stopPropagation(); // Prevent click from closing immediately
        });

        // Close music menu if clicked outside
        document.addEventListener('click', (event) => {
            if (!musicMenu.contains(event.target) && !musicHamburger.contains(event.target)) {
                musicMenu.classList.remove('show');
            }
        });

        // Music controls
        musicPlayPauseButton.addEventListener('click', toggleMusicPlayPause);
        musicNextButton.addEventListener('click', playNextTrack);
        musicPrevButton.addEventListener('click', playPreviousTrack);
        backgroundMusic.addEventListener('ended', playNextTrack); // Auto-play next track

        // Footer buttons
        supportChatButton.addEventListener('click', () => {
            window.open('https://t.me/your_project_support_chat', '_blank'); // Placeholder Telegram link
        });

        supportAiButton.addEventListener('click', () => {
            chatContainer.classList.toggle('hidden'); // Toggle visibility of AI chat
            // If chat is shown, ensure input is visible and focus
            if (!chatContainer.classList.contains('hidden')) {
                chatContainer.classList.add('expanded');
                chatToggleButton.innerHTML = 'Свернуть чат <i class="fas fa-chevron-down"></i>';
                chatInput.focus(); // Focus the input field
                chatMessages.innerHTML = ''; // Clear chat history for a fresh start
                addChatMessage('Привет! Я AI-помощник. Чем могу помочь? Я могу отвечать на вопросы, давать советы и предоставлять ссылки на полезные ресурсы.', 'ai');
            } else {
                chatContainer.classList.remove('expanded');
                chatToggleButton.innerHTML = 'Спроси, что интересно <i class="fas fa-chevron-up"></i>';
            }
            clearImagePreview(chatImagePreview, chatImagePreviewContainer); // Clear image when chat opens/closes
        });

        // AI Chat toggle button (for expanding/collapsing chat)
        chatToggleButton.addEventListener('click', () => {
            chatContainer.classList.toggle('expanded');
            const icon = chatToggleButton.querySelector('i');
            if (chatContainer.classList.contains('expanded')) {
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
                chatToggleButton.innerHTML = 'Свернуть чат <i class="fas fa-chevron-down"></i>';
            } else {
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
                chatToggleButton.innerHTML = 'Спроси, что интересно <i class="fas fa-chevron-up"></i>';
            }
        });

        // AI Chat send button
        sendChatButton.addEventListener('click', sendAIChatMessage);
        chatInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                sendAIChatMessage();
            }
        });

        // LLM Modal close button
        llmModalCloseButton.addEventListener('click', hideLlmModal);
        llmModal.addEventListener('click', (event) => {
            if (event.target === llmModal) { // Close if clicked outside content
                hideLlmModal();
            }
        });
        // Message Box close button
        messageBoxCloseButton.addEventListener('click', hideMessageBox);

        // Image upload attachment buttons
        chatAttachmentButton.addEventListener('click', () => {
            imageUploadChoiceModal.classList.remove('hidden');
            currentImageTarget = 'chat';
        });

        llmModalAttachmentButton.addEventListener('click', () => {
            imageUploadChoiceModal.classList.remove('hidden');
            currentImageTarget = 'modal';
        });

        takePhotoButton.addEventListener('click', () => {
            imageUploadCamera.click();
        });

        chooseFromDeviceButton.addEventListener('click', () => {
            imageUploadFile.click();
        });

        imageUploadChoiceCancelButton.addEventListener('click', () => {
            imageUploadChoiceModal.classList.add('hidden');
        });

        imageUploadCamera.addEventListener('change', (event) => {
            if (currentImageTarget === 'chat') {
                handleImageFile(event, chatImagePreview, chatImagePreviewContainer);
            } else if (currentImageTarget === 'modal') {
                handleImageFile(event, llmModalImagePreview, llmModalImagePreviewContainer);
            }
        });

        imageUploadFile.addEventListener('change', (event) => {
            if (currentImageTarget === 'chat') {
                handleImageFile(event, chatImagePreview, chatImagePreviewContainer);
            } else if (currentImageTarget === 'modal') {
                handleImageFile(event, llmModalImagePreview, llmModalImagePreviewContainer);
            }
        });

        chatClearImageButton.addEventListener('click', () => {
            clearImagePreview(chatImagePreview, chatImagePreviewContainer);
        });

        llmModalClearImageButton.addEventListener('click', () => {
            clearImagePreview(llmModalImagePreview, llmModalImagePreviewContainer);
        });


        // Include Marked.js for Markdown parsing
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
        script.onload = () => {
            console.log('Marked.js loaded');
        };
        document.head.appendChild(script);

    </script>
</body>
</html>
